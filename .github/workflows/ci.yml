name: CI Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend   # 👈 VERY IMPORTANT

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22   # 👈 matches your Docker fix

      - name: Install deps
        run: npm install

      - name: Lint
        run: npm run lint

      # Optional (only if you added vitest)
      # - name: Test
      #   run: npm run test

      - name: Build
        run: npm run build

      - name: Docker Build
        run: docker build -t vite-app .